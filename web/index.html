<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstroGuard 🔭</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d18;
      color: #c9d1e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }

    header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #1a1a2e;
      background: #0a0a14;
    }
    header h1 { font-size: 1.1rem; color: #e8eaf6; }
    header .loc { color: #5c6bc0; font-size: 0.82rem; margin-left: 6px; }
    header .moon { margin-left: auto; font-size: 0.8rem; color: #7986cb; }

    .wrap { overflow-x: auto; }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 600px;
    }

    /* Sticky header */
    thead th {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0a0a14;
      color: #546e7a;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 5px 8px;
      text-align: center;
      border-bottom: 2px solid #1a1a2e;
      white-space: nowrap;
    }
    thead th:first-child { text-align: left; padding-left: 10px; }
    thead th.sep { border-left: 1px solid #1e1e38; }

    /* Day separator row */
    tr.day-header td {
      background: #111128;
      color: #7986cb;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-top: 2px solid #1a1a2e;
      border-bottom: 1px solid #1a1a2e;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    /* Data rows */
    tbody tr.data-row { border-bottom: 1px solid rgba(255,255,255,0.03); }
    tbody tr.data-row:hover { filter: brightness(1.2); }

    td {
      padding: 3px 6px;
      text-align: center;
      font-weight: 700;
      font-size: 0.8rem;
      white-space: nowrap;
      line-height: 1;
      height: 26px;
    }

    td.hour {
      text-align: left;
      padding-left: 10px;
      font-weight: 700;
      color: #90a4ae;
      background: #0a0a14 !important;
      width: 52px;
      font-size: 0.75rem;
      border-right: 1px solid #1a1a2e;
    }
    td.hour .moon-mark { color: #3949ab; font-size: 0.6rem; margin-left: 2px; }

    td.sep { border-left: 1px solid #1e1e38; }

    td.score-cell {
      border-left: 1px solid #1e1e38;
      font-size: 0.7rem;
    }

    /* Row night/day background */
    tr.is-night td { background-color: #090912; }
    tr.is-day   td { background-color: #0c0c1a; opacity: 0.5; }

    .score-go    { color: #69f0ae; }
    .score-maybe { color: #ffd54f; }
    .score-no    { color: #263238; }

    .loader {
      text-align: center;
      padding: 60px;
      color: #3949ab;
    }
  </style>
</head>
<body>

<header>
  <span>🔭</span>
  <h1>AstroGuard <span class="loc">📍 Rueil-Malmaison</span></h1>
  <div class="moon" id="moon-badge">🌙 chargement...</div>
</header>

<div class="wrap">
  <div id="table-container"><div class="loader">⏳ Chargement...</div></div>
</div>

<script>
const LAT = 48.8773, LON = 2.1890;
const THR = { cloud: 20, humidity: 80, wind: 20, seeing: 3 };

// ── Heatmap couleur vive sur fond sombre ─────────────────────────────────────
// t=0 (mauvais) → t=1 (excellent)
// On génère une vraie couleur saturée mais en background très sombre
function heatCell(t, isNight) {
  if (t === null) return '';
  const clamped = Math.max(0, Math.min(1, t));
  // Teinte: 0=rouge(0°) 0.5=orange(30°) 1=vert(120°)
  const hue = clamped < 0.5 ? clamped * 2 * 30 : 30 + (clamped - 0.5) * 2 * 90;
  // Saturation forte, luminosité faible (style meteoblue dark)
  const sat = 70 + clamped * 25;
  const lig = isNight ? 12 + clamped * 20 : 8 + clamped * 10;
  const textLig = 55 + clamped * 30;
  return `background:hsl(${Math.round(hue)},${Math.round(sat)}%,${Math.round(lig)}%);color:hsl(${Math.round(hue)},80%,${Math.round(textLig)}%);`;
}

function tCloud(v)    { return 1 - v / 100; }
function tHumid(v)    { return 1 - Math.max(0, v - 40) / 60; }
function tWind(v)     { return 1 - Math.min(v, 40) / 40; }
function tSeeing(v)   { return v > 0 ? (v - 1) / 7 : null; }
function tTransp(v)   { return v > 0 ? (v - 1) / 7 : null; }

function isNightHour(h) { return h >= 20 || h <= 5; }

function isGood(cloud, humid, wind, seeing) {
  return cloud <= THR.cloud && humid <= THR.humidity && wind <= THR.wind && seeing >= THR.seeing;
}

function moonPhase(date) {
  const known = new Date(2000, 0, 6);
  const phase = (((date - known) / 86400000) % 29.53059 + 29.53059) % 29.53059;
  const pct = Math.round((phase / 29.53059) * 100);
  const emojis = ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];
  const idx = Math.round(phase / 29.53059 * 7);
  return { emoji: emojis[idx % 8], pct };
}

async function fetchOpenMeteo() {
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=cloudcover,relativehumidity_2m,windspeed_10m&timezone=Europe/Paris&forecast_days=3`);
  return r.json();
}

async function fetch7timer() {
  const r = await fetch(`https://www.7timer.info/bin/api.pl?lon=${LON}&lat=${LAT}&product=astro&output=json`);
  return r.json();
}

function build7timerMap(astro) {
  const map = {};
  const s = astro.init;
  const init = new Date(Date.UTC(+s.slice(0,4), +s.slice(4,6)-1, +s.slice(6,8), +s.slice(8,10)));
  astro.dataseries.forEach((e, i) => {
    for (let h = 0; h < 3; h++) {
      const tt = new Date(init.getTime() + (i * 3 + h) * 3600000);
      const key = tt.toISOString().slice(0, 13);
      map[key] = { seeing: e.seeing || 0, transparency: e.transparency || 0 };
    }
  });
  return map;
}

async function main() {
  try {
    const [meteo, astro] = await Promise.all([fetchOpenMeteo(), fetch7timer()]);
    const smap = build7timerMap(astro);
    const { time, cloudcover: clouds, relativehumidity_2m: humid, windspeed_10m: wind } = meteo.hourly;

    // Moon badge
    const moon = moonPhase(new Date());
    document.getElementById('moon-badge').textContent = `${moon.emoji} ${moon.pct}% du cycle · seuils: ☁️≤${THR.cloud}% 💧≤${THR.humidity}% 💨≤${THR.wind}km/h 👁️≥${THR.seeing}/8`;

    let html = `
      <table>
        <thead>
          <tr>
            <th rowspan="2">H</th>
            <th colspan="3">☁️ Open-Meteo</th>
            <th colspan="2" class="sep">⭐ 7timer</th>
            <th class="sep">✓</th>
          </tr>
          <tr>
            <th>Nuages</th><th>Humidité</th><th>Vent</th>
            <th class="sep">Seeing</th><th>Transp.</th>
            <th class="sep"></th>
          </tr>
        </thead>
        <tbody>`;

    let lastDay = null;

    time.forEach((tStr, i) => {
      const t   = new Date(tStr);
      const day = tStr.slice(0, 10);
      const hr  = t.getHours();
      const night = isNightHour(hr);

      // Day separator
      if (day !== lastDay) {
        const label = t.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        html += `<tr class="day-header"><td colspan="7">📅 ${label}</td></tr>`;
        lastDay = day;
      }

      const key     = tStr.slice(0, 13);
      const ad      = smap[key] || { seeing: 0, transparency: 0 };
      const cl      = clouds[i], hu = humid[i], wi = Math.round(wind[i]);
      const se      = ad.seeing, tr = ad.transparency;
      const good    = night && isGood(cl, hu, wi, se);
      const rowCls  = night ? 'is-night' : 'is-day';

      const scoreHtml = !night
        ? `<span class="score-no">·</span>`
        : good
          ? `<span class="score-go">✅</span>`
          : (cl <= 50 && se >= 2)
            ? `<span class="score-maybe">▲</span>`
            : `<span class="score-no">✗</span>`;

      const hourLabel = String(hr).padStart(2, '0') + 'h';
      const nightMark = night ? `<span class="moon-mark">🌙</span>` : '';

      html += `<tr class="data-row ${rowCls}">
        <td class="hour">${hourLabel}${nightMark}</td>
        <td style="${heatCell(tCloud(cl), night)}">${cl}%</td>
        <td style="${heatCell(tHumid(hu), night)}">${hu}%</td>
        <td style="${heatCell(tWind(wi), night)}">${wi}</td>
        <td class="sep" style="${heatCell(tSeeing(se), night)}">${se > 0 ? se+'/8' : '—'}</td>
        <td style="${heatCell(tTransp(tr), night)}">${tr > 0 ? tr+'/8' : '—'}</td>
        <td class="sep score-cell">${scoreHtml}</td>
      </tr>`;
    });

    html += `</tbody></table>`;
    document.getElementById('table-container').innerHTML = html;

  } catch (e) {
    document.getElementById('table-container').innerHTML =
      `<div class="loader" style="color:#ef5350">❌ ${e.message}</div>`;
    console.error(e);
  }
}

main();
</script>
</body>
</html>
