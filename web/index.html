<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstroGuard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌑</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d18;
      color: #c9d1e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #1a1a2e;
      background: #0a0a14;
    }
    header h1  { font-size: 1.1rem; color: #e8eaf6; }
    header .moon { margin-left: auto; font-size: 0.8rem; color: #7986cb; }

    /* ── Location autocomplete ── */
    .loc-wrap {
      position: relative;
      margin-left: 6px;
    }
    #loc-input {
      background: #14142a;
      border: 1px solid #1e1e3a;
      border-radius: 6px;
      color: #5c6bc0;
      font-size: 0.82rem;
      padding: 4px 10px;
      width: 220px;
      outline: none;
      font-family: inherit;
    }
    #loc-input:focus { border-color: #3949ab; }
    #loc-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      width: 300px;
      max-height: 260px;
      overflow-y: auto;
      background: #111128;
      border: 1px solid #1e1e3a;
      border-radius: 8px;
      margin-top: 4px;
      z-index: 200;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    #loc-dropdown .loc-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      color: #c9d1e0;
      border-bottom: 1px solid #0f0f1e;
    }
    #loc-dropdown .loc-item:hover { background: #1a1a3a; }
    #loc-dropdown .loc-item .loc-sub {
      font-size: 0.68rem;
      color: #546e7a;
      margin-top: 2px;
    }

    /* ── Layout : sidebar + tableau centrés ── */
    .content-area {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 24px;
      padding: 16px;
    }

    /* ── Sidebar flottante ── */
    #sidebar {
      position: sticky;
      top: 58px;
      width: 230px;
      max-height: calc(100vh - 70px);
      flex-shrink: 0;
      background: #0c0c1c;
      border: 1px solid #1e1e3a;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 99;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: #1e1e38; border-radius: 2px; }

    .sb-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #37474f;
      padding: 12px 12px 7px;
      border-bottom: 1px solid #111128;
    }

    .sb-item {
      padding: 9px 12px;
      border-bottom: 1px solid #0f0f1e;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sb-item:hover { background: #0f0f22; }
    .sb-item.active {
      background: #111130;
      border-left: 3px solid #3949ab;
      padding-left: 9px;
    }

    .sb-item .sb-top {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .sb-item .sb-top .sb-icon { font-size: 0.85rem; }
    .sb-item .sb-top .sb-label { color: #c9d1e0; font-weight: 600; }
    .sb-item .sb-pct {
      font-size: 0.68rem;
      color: #546e7a;
      font-weight: 500;
    }
    .sb-item .sb-clouds {
      display: flex;
      gap: 4px;
      font-size: 0.68rem;
      color: #546e7a;
      margin-top: 2px;
    }
    .sb-item .sb-clouds span {
      background: #111128;
      padding: 1px 4px;
      border-radius: 3px;
      font-weight: 600;
    }

    /* ── Tableau ── */
    .main {
      flex-shrink: 0;
    }

    table { border-collapse: collapse; width: fit-content; }

    thead th {
      position: sticky;
      top: var(--header-h, 41px);
      z-index: 10;
      background: #0a0a14;
      color: #546e7a;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 5px 8px;
      text-align: center;
      border-bottom: 2px solid #1a1a2e;
      white-space: nowrap;
    }
    thead th:first-child { text-align: left; padding-left: 10px; }
    thead th.sep { border-left: 1px solid #1e1e38; }

    tr.day-header td {
      background: #111128;
      color: #7986cb;
      font-size: 0.75rem;
      padding: 5px 10px;
      border-top: 2px solid #1a1a2e;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    tr.sub-header td {
      background: #0d0d1e;
      color: #455a64;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 3px 8px;
      text-align: center;
      border-bottom: 1px solid #1a1a2e;
      white-space: nowrap;
      font-weight: 600;
    }
    tr.sub-header td:first-child { text-align: left; padding-left: 10px; }
    tr.sub-header td.sep { border-left: 1px solid #1e1e38; }

    tbody tr.data-row { border-bottom: 1px solid rgba(255,255,255,0.03); }
    tbody tr.data-row:hover { filter: brightness(1.2); }

    td {
      padding: 3px 8px;
      text-align: center;
      font-weight: 700;
      font-size: 0.8rem;
      white-space: nowrap;
      line-height: 1;
      height: 26px;
      width: 1%;
    }
    td.hour {
      text-align: left;
      padding-left: 10px;
      font-weight: 700;
      color: #90a4ae;
      background: #0a0a14 !important;
      font-size: 0.75rem;
      border-right: 1px solid #1a1a2e;
      white-space: nowrap;
    }
    td.sep { border-left: 1px solid #1e1e38; }
    td.score-cell {
      border-right: 1px solid #1e1e38;
      font-size: 0.75rem;
      text-align: center;
      padding: 3px 6px;
    }

    tr.is-night td { background-color: #090912; }
    tr.is-day   td { background-color: #0c0c1a; opacity: 0.5; }

    .score-go    { color: #69f0ae; }
    .score-maybe { color: #ffd54f; }
    .score-no    { color: #263238; }

    .loader { text-align: center; padding: 60px; color: #3949ab; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <span>🌑</span>
  <h1>AstroGuard</h1>
  <div class="loc-wrap">
    <span style="color:#5c6bc0">📍</span>
    <input id="loc-input" type="text" placeholder="Rechercher une ville..." value="Rueil-Malmaison" autocomplete="off">
    <div id="loc-dropdown"></div>
  </div>
  <div class="moon" id="moon-badge">🌙 chargement...</div>
</header>

<!-- Sidebar + Tableau centrés -->
<div class="content-area">
  <div id="sidebar">
    <div class="sb-title">Sommaire</div>
    <div id="sb-list"><div style="padding:12px;color:#37474f;font-size:.75rem">Chargement...</div></div>
  </div>
  <div class="main">
    <div id="table-container"><div class="loader">⏳ Chargement...</div></div>
  </div>
</div>

<script>
let LAT = 48.8773, LON = 2.1890;
const THR = { cloud: 20 };

function heatCell(t, isNight) {
  if (t === null) return '';
  const c = Math.max(0, Math.min(1, t));
  const hue = c < 0.5 ? c * 2 * 30 : 30 + (c - 0.5) * 2 * 90;
  const sat = 70 + c * 25;
  const lig = isNight ? 12 + c * 20 : 8 + c * 10;
  const textLig = 55 + c * 30;
  return `background:hsl(${Math.round(hue)},${Math.round(sat)}%,${Math.round(lig)}%);color:hsl(${Math.round(hue)},80%,${Math.round(textLig)}%);`;
}

function cloudColor(pct) {
  const t = 1 - pct / 100;
  const hue = t < 0.5 ? t * 2 * 30 : 30 + (t - 0.5) * 2 * 90;
  return `hsl(${Math.round(hue)},70%,55%)`;
}

function tCloud(v)  { return 1 - v / 100; }
function tHumid(v)  { return 1 - Math.max(0, v - 40) / 60; }
function tWind(v)   { return 1 - Math.min(v, 40) / 40; }
function tSeeing(v) { return v > 0 ? (v - 1) / 7 : null; }
function tTransp(v) { return v > 0 ? (v - 1) / 7 : null; }
// sunMap rempli dynamiquement par main() avec les vrais horaires sunset/sunrise
let sunMap = {};
function isNight(day, hour) {
  const sun = sunMap[day];
  if (!sun) return hour >= 20 || hour <= 5; // fallback
  return hour >= Math.ceil(sun.sunset) || hour < Math.floor(sun.sunrise);
}

function moonIllumination(date) {
  const known = new Date(2000, 0, 6);
  const phase = (((date - known) / 86400000) % 29.53059 + 29.53059) % 29.53059;
  const angle = (phase / 29.53059) * 2 * Math.PI;
  return Math.round((1 - Math.cos(angle)) / 2 * 100);
}

function moonPhase(date) {
  const known = new Date(2000, 0, 6);
  const phase = (((date - known) / 86400000) % 29.53059 + 29.53059) % 29.53059;
  const emojis = ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];
  const pct = Math.round((phase / 29.53059) * 100);
  return { emoji: emojis[Math.round(phase / 29.53059 * 7) % 8], pct };
}

const SUB_HEADER = `
  <tr class="sub-header">
    <td>✓</td><td>H</td>
    <td class="sep">Bas</td><td>Moy</td><td>Haut</td>
    <td class="sep">Total</td><td>Humidité</td><td>Vent</td>
    <td class="sep">Seeing</td><td>Transp.</td>
    <td class="sep">🌙</td>
  </tr>`;

async function fetchOpenMeteo() {
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=cloudcover,cloudcover_low,cloudcover_mid,cloudcover_high,relativehumidity_2m,windspeed_10m&daily=sunset,sunrise&timezone=Europe/Paris&forecast_days=8`);
  return r.json();
}
async function fetch7timer() {
  const r = await fetch(`https://www.7timer.info/bin/api.pl?lon=${LON}&lat=${LAT}&product=astro&output=json`);
  return r.json();
}
function build7timerMap(astro) {
  const map = {};
  const s = astro.init;
  const init = new Date(Date.UTC(+s.slice(0,4), +s.slice(4,6)-1, +s.slice(6,8), +s.slice(8,10)));
  astro.dataseries.forEach((e, i) => {
    for (let h = 0; h < 3; h++) {
      const tt = new Date(init.getTime() + (i * 3 + h) * 3600000);
      map[tt.toISOString().slice(0, 13)] = { seeing: e.seeing || 0, transparency: e.transparency || 0 };
    }
  });
  return map;
}

async function main() {
  try {
    const [meteo, astro] = await Promise.all([fetchOpenMeteo(), fetch7timer()]);
    const smap = build7timerMap(astro);
    const { time, cloudcover: clouds, cloudcover_low: cLow, cloudcover_mid: cMid, cloudcover_high: cHigh,
            relativehumidity_2m: humid, windspeed_10m: wind } = meteo.hourly;

    const moon = moonPhase(new Date());
    document.getElementById('moon-badge').textContent =
      `${moon.emoji} ${moon.pct}% du cycle · seuil nuages ≤${THR.cloud}%`;

    // Calibrer le top sticky du thead sur la vraie hauteur du header
    const headerEl = document.querySelector('header');
    if (headerEl) document.documentElement.style.setProperty('--header-h', headerEl.offsetHeight + 'px');

    // ── Horaires sunset/sunrise réels par jour ──
    if (meteo.daily) {
      meteo.daily.time.forEach((day, i) => {
        const ss = new Date(meteo.daily.sunset[i]);
        const sr = new Date(meteo.daily.sunrise[i]);
        sunMap[day] = {
          sunset: ss.getHours() + ss.getMinutes() / 60,
          sunrise: sr.getHours() + sr.getMinutes() / 60
        };
      });
    }

    // ── Pré-calcul stats par NUIT ASTRONOMIQUE (soir J + matin J+1) ──
    const nightStats = {}; // key = date du soir (YYYY-MM-DD)
    time.forEach((tStr, i) => {
      const t  = new Date(tStr);
      const hr = t.getHours();
      const calDay = tStr.slice(0, 10);
      if (!isNight(calDay, hr)) return;

      // Heures du matin → rattachées à la nuit de la veille
      let nightKey;
      const sun = sunMap[calDay];
      if (sun && hr < Math.floor(sun.sunrise)) {
        const prev = new Date(calDay + 'T12:00:00');
        prev.setDate(prev.getDate() - 1);
        nightKey = prev.toISOString().slice(0, 10);
      } else {
        nightKey = calDay;
      }

      if (!nightStats[nightKey]) nightStats[nightKey] = { total: 0, sumClouds: 0, sumL: 0, sumM: 0, sumH: 0 };
      const s = nightStats[nightKey];
      s.total++;
      s.sumClouds += clouds[i];
      s.sumL += cLow[i]; s.sumM += cMid[i]; s.sumH += cHigh[i];
    });
    const sbList = document.getElementById('sb-list');
    const nights = Object.keys(nightStats).sort();
    sbList.innerHTML = nights.map(day => {
      const s = nightStats[day];
      const avgClouds = s.total ? s.sumClouds / s.total : 100;
      const pct = Math.round(100 - avgClouds);
      const icon = avgClouds <= 20 ? '✅' : avgClouds <= 50 ? '<span style="color:#ffd54f">▲</span>' : '🔴';
      const t = new Date(day + 'T12:00:00');
      const next = new Date(t); next.setDate(next.getDate() + 1);
      const label = t.toLocaleDateString('fr-FR', { weekday: 'short' }) + '-' + next.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
      const avgL = s.total ? Math.round(s.sumL / s.total) : '—';
      const avgM = s.total ? Math.round(s.sumM / s.total) : '—';
      const avgH = s.total ? Math.round(s.sumH / s.total) : '—';
      return `
        <div class="sb-item" data-day="${day}" onclick="scrollToDay('${day}')">
          <div class="sb-top">
            <span class="sb-icon">${icon}</span>
            <span class="sb-label">${label}</span>
          </div>
          <div class="sb-pct">${pct}% de la nuit dégagée</div>
          <div class="sb-clouds">
            <span style="color:${cloudColor(avgL)}">B:${avgL}%</span>
            <span style="color:${cloudColor(avgM)}">M:${avgM}%</span>
            <span style="color:${cloudColor(avgH)}">H:${avgH}%</span>
          </div>
        </div>`;
    }).join('');

    // ── Tableau principal ──
    let html = `
      <table id="main-table">
        <thead>
          <tr>
            <th>✓</th>
            <th>H</th>
            <th class="sep">Bas</th><th>Moy</th><th>Haut</th>
            <th class="sep">Total</th><th>Humid.</th><th>Vent</th>
            <th class="sep">Seeing</th><th>Transp.</th>
            <th class="sep">🌙</th>
          </tr>
        </thead>
        <tbody>`;

    let lastDay = null;
    time.forEach((tStr, i) => {
      const t   = new Date(tStr);
      const day = tStr.slice(0, 10);
      const hr  = t.getHours();
      const night = isNight(day, hr);

      if (day !== lastDay) {
        const prev = new Date(t); prev.setDate(prev.getDate() - 1);
        const wdPrev = prev.toLocaleDateString('fr-FR', { weekday: 'long' });
        const wdCurr = t.toLocaleDateString('fr-FR', { weekday: 'long' });
        const datePart = t.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        const label = `${wdPrev}-${wdCurr} ${datePart}`;
        html += `<tr class="day-header" data-day="${day}" id="day-${day}"><td colspan="11">📅 ${label}</td></tr>`;
        html += SUB_HEADER;
        lastDay = day;
      }

      const key = tStr.slice(0, 13);
      const ad  = smap[key] || { seeing: 0, transparency: 0 };
      const cl  = clouds[i], cl_l = cLow[i], cl_m = cMid[i], cl_h = cHigh[i];
      const hu  = humid[i],  wi   = Math.round(wind[i]);
      const se  = ad.seeing, tr   = ad.transparency;
      const illum = moonIllumination(t);
      const rowCls = night ? 'is-night' : 'is-day';

      const scoreHtml = !night ? `<span class="score-no">·</span>`
        : cl <= THR.cloud  ? `<span class="score-go">✅</span>`
        : cl <= 50         ? `<span class="score-maybe">▲</span>`
                           : `<span class="score-no">🔴</span>`;

      const moonColor = illum < 25 ? '#69f0ae' : illum < 60 ? '#ffd54f' : '#ef9a9a';
      const hourLabel = String(hr).padStart(2,'0') + 'h';
      const nightMark = night ? ` <span style="color:#3949ab;font-size:.6rem">🌙</span>` : '';

      html += `<tr class="data-row ${rowCls}">
        <td class="score-cell">${scoreHtml}</td>
        <td class="hour">${hourLabel}${nightMark}</td>
        <td class="sep" style="${heatCell(tCloud(cl_l),night)}">${cl_l}%</td>
        <td style="${heatCell(tCloud(cl_m),night)}">${cl_m}%</td>
        <td style="${heatCell(tCloud(cl_h),night)}">${cl_h}%</td>
        <td class="sep" style="${heatCell(tCloud(cl),night)}">${cl}%</td>
        <td style="${heatCell(tHumid(hu),night)}">${hu}%</td>
        <td style="${heatCell(tWind(wi),night)}">${wi}</td>
        <td class="sep" style="${heatCell(tSeeing(se),night)}">${se>0?se+'/8':'—'}</td>
        <td style="${heatCell(tTransp(tr),night)}">${tr>0?tr+'/8':'—'}</td>
        <td class="sep" style="color:${moonColor};background:#090912">${night?illum+'%':'—'}</td>
      </tr>`;
    });

    html += `</tbody></table>`;
    document.getElementById('table-container').innerHTML = html;

    // ── IntersectionObserver : surbrillance sidebar ──
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const day = entry.target.dataset.day;
          document.querySelectorAll('.sb-item').forEach(el => {
            el.classList.toggle('active', el.dataset.day === day);
          });
          const sbItem = document.querySelector(`.sb-item[data-day="${day}"]`);
          if (sbItem) sbItem.scrollIntoView({ block: 'nearest' });
        }
      });
    }, { rootMargin: '-10% 0px -80% 0px', threshold: 0 });

    document.querySelectorAll('tr.day-header[data-day]').forEach(el => observer.observe(el));

  } catch (e) {
    document.getElementById('table-container').innerHTML =
      `<div class="loader" style="color:#ef5350">❌ ${e.message}</div>`;
    console.error(e);
  }
}

function scrollToDay(day) {
  const el = document.getElementById('day-' + day);
  if (!el) return;
  const y = el.getBoundingClientRect().top + window.scrollY - 90;
  window.scrollTo({ top: y, behavior: 'smooth' });
}

// ── Autocomplétion ville ──
const locInput = document.getElementById('loc-input');
const locDropdown = document.getElementById('loc-dropdown');
let debounceTimer = null;

// Restaurer depuis localStorage
const saved = localStorage.getItem('astroguard-loc');
if (saved) {
  try {
    const s = JSON.parse(saved);
    LAT = s.lat; LON = s.lon;
    locInput.value = s.name;
  } catch(e) {}
}

locInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  const q = locInput.value.trim();
  if (q.length < 2) { locDropdown.style.display = 'none'; return; }
  debounceTimer = setTimeout(() => {
    fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=fr`)
      .then(r => r.json())
      .then(data => {
        if (!data.results || !data.results.length) {
          locDropdown.style.display = 'none'; return;
        }
        locDropdown.innerHTML = data.results.map(r => {
          const sub = [r.admin1, r.country].filter(Boolean).join(', ');
          return `<div class="loc-item" data-lat="${r.latitude}" data-lon="${r.longitude}" data-name="${r.name}">
            ${r.name}<div class="loc-sub">${sub} · ${r.latitude.toFixed(2)}°N ${r.longitude.toFixed(2)}°E</div>
          </div>`;
        }).join('');
        locDropdown.style.display = 'block';
      })
      .catch(() => { locDropdown.style.display = 'none'; });
  }, 300);
});

locDropdown.addEventListener('click', (e) => {
  const item = e.target.closest('.loc-item');
  if (!item) return;
  LAT = parseFloat(item.dataset.lat);
  LON = parseFloat(item.dataset.lon);
  const name = item.dataset.name;
  locInput.value = name;
  locDropdown.style.display = 'none';
  localStorage.setItem('astroguard-loc', JSON.stringify({ lat: LAT, lon: LON, name }));
  sunMap = {};
  main();
});

// Fermer dropdown au clic extérieur
document.addEventListener('click', (e) => {
  if (!e.target.closest('.loc-wrap')) locDropdown.style.display = 'none';
});

main();
</script>
</body>
</html>
